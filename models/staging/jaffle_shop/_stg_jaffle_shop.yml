models: 
  - name: stg_jaffle_shop_customers
    description: "This is a description about the stg jaffle shop customers model"
    columns:
      - name: customer_id
        description: primary key
        tests:
          - not_null
          - unique
      - name: first_name
        tests:
          - not_null
      - name: last_name
        tests:
          - not_null
  - name: stg_jaffle_shop_orders
    description: "What's this table about? Grain etc."
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_jaffle_shop_customers')
                field: customer_id
      - name: order_date
        tests: 
          - not_null
      - name: status
        description: '{{ doc("order_status") }}'
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['placed', 'shipped', 'completed', 'returned', 'in_progress', 'cancelled', 'return_pending']